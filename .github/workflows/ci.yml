name: Qualitätssicherung

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Installationsskripte und Compose-Dateien prüfen
        run: |
          sh -n install.sh docker-entrypoint.sh deploy/update-host.sh
          POSTGRES_PASSWORD=test APP_BASE_URL=https://tickets.example.com TIXARO_PROXY_NETWORK=tixaro_proxy docker compose config >/dev/null
          POSTGRES_PASSWORD=test APP_BASE_URL=https://tickets.example.com TIXARO_PROXY_NETWORK=tixaro_proxy APP_PORT=3000 docker compose -f docker-compose.yml -f docker-compose.host-nginx.yml config >/dev/null
          POSTGRES_PASSWORD=test APP_BASE_URL=https://tickets.example.com TIXARO_PROXY_NETWORK=tixaro_proxy TIXARO_HTTP_PORT=8080 docker compose -f docker-compose.yml -f docker-compose.nginx.yml config >/dev/null
      - name: Docker-Image bauen
        run: docker build --tag tixaro:test .
