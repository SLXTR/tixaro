services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tixaro
      POSTGRES_USER: tixaro
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt - starte sh install.sh}"
    volumes:
      - tixaro_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tixaro_internal

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      TRUST_PROXY: ${TRUST_PROXY:-1}
      APP_BASE_URL: "${APP_BASE_URL:?APP_BASE_URL fehlt - starte sh install.sh}"
      TIXARO_UPDATE_MODE: host
      TIXARO_UPDATE_REPOSITORY: ${TIXARO_UPDATE_REPOSITORY:-SLXTR/tixaro}
      DATABASE_URL: "postgresql://tixaro:${POSTGRES_PASSWORD}@db:5432/tixaro"
    expose:
      - "3000"
    volumes:
      - tixaro_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      tixaro_internal:
      tixaro_proxy:
        aliases:
          - tixaro-app

volumes:
  tixaro_postgres:
  tixaro_data:

networks:
  tixaro_internal:
    driver: bridge
  tixaro_proxy:
    name: ${TIXARO_PROXY_NETWORK:-tixaro_proxy}
    external: true
